<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth light-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SaaS Ecosystem</title>
    <link rel="icon" href="./imgs/logo.png">
    
    <!-- Tailwind CSS -->
    <script>
        // Suppress Tailwind CDN production warning
        const originalWarn = console.warn;
        console.warn = function() {
            if (arguments[0] && arguments[0].includes && arguments[0].includes('cdn.tailwindcss.com should not be used in production')) {
                return;
            }
            originalWarn.apply(console, arguments);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: 'var(--color-bg)',
                        card: 'var(--color-card)',
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        accent: '#0ea5e9'
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS Integrado -->
    <style>
        :root {
            --color-bg: #0f172a;
            --color-card-bg: rgba(30, 41, 59, 0.7);
            --color-chart-bg: rgba(15, 23, 42, 0.6);
            --color-section-alt: rgba(15, 23, 42, 0.5);
            --color-border: rgba(255, 255, 255, 0.1);
            --color-text: #cbd5e1; /* slate-300 */
            --color-heading: #ffffff;
            --color-text-muted: #94a3b8; /* slate-400 */
        }

        .light-mode {
            --color-bg: #f8fafc; /* slate-50 */
            --color-card-bg: rgba(255, 255, 255, 0.8);
            --color-chart-bg: rgba(241, 245, 249, 0.8);
            --color-section-alt: rgba(241, 245, 249, 0.5);
            --color-border: rgba(15, 23, 42, 0.1);
            --color-text: #334155; /* slate-700 */
            --color-heading: #0f172a; /* slate-900 */
            --color-text-muted: #64748b; /* slate-500 */
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Glassmorphism */
        .glass-card {
            background: var(--color-card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--color-border);
        }
    </style>
</head>
<body class="bg-dark text-[var(--color-text)] font-sans antialiased overflow-x-hidden selection:bg-primary selection:text-white transition-colors duration-500">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-card border-b border-white/5 transition-all duration-300 bg-dark/80" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <img src="./imgs/logo.png" alt="Logo" class="w-8 h-8 bg-white/90 p-1 rounded-md" />
                    <span class="text-[var(--color-heading)] font-bold text-xl tracking-wider">Dashboard<span class="text-primary">Leads</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="./index.html" class="text-sm font-medium text-[var(--color-text-muted)] hover:text-primary transition-colors flex items-center gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar ao Site
                    </a>
                    <button id="logout-btn" class="hidden text-sm font-medium text-[var(--color-text-muted)] hover:text-red-500 transition-colors flex items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Sair
                    </button>
                    <button id="theme-toggle" aria-label="Alternar Tema" class="p-2 flex items-center justify-center rounded-full hover:bg-[var(--color-bg)] transition-colors text-[var(--color-text-muted)] hover:text-primary">
                        <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Container -->
    <div id="login-container" class="pt-32 pb-20 min-h-screen flex items-center justify-center px-4">
        <div class="glass-card rounded-2xl p-8 max-w-md w-full shadow-xl border border-[var(--color-border)]">
            <div class="text-center mb-8">
                <i data-lucide="lock" class="w-12 h-12 text-primary mx-auto mb-4"></i>
                <h2 class="text-2xl font-bold text-[var(--color-heading)]">Acesso Restrito</h2>
                <p class="text-[var(--color-text-muted)] mt-2">Faça login para acessar o dashboard.</p>
            </div>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-[var(--color-text)] mb-2">E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="w-5 h-5 text-[var(--color-text-muted)]"></i>
                        </div>
                        <input type="email" id="email" required
                            class="block w-full pl-10 pr-3 py-3 border border-[var(--color-border)] rounded-lg bg-[var(--color-bg)] text-[var(--color-heading)] placeholder-[var(--color-text-muted)] focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="seu@email.com">
                    </div>
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-[var(--color-text)] mb-2">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="key" class="w-5 h-5 text-[var(--color-text-muted)]"></i>
                        </div>
                        <input type="password" id="password" required
                            class="block w-full pl-10 pr-3 py-3 border border-[var(--color-border)] rounded-lg bg-[var(--color-bg)] text-[var(--color-heading)] placeholder-[var(--color-text-muted)] focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <div id="login-error" class="hidden text-red-500 text-sm font-medium text-center">
                    Credenciais inválidas.
                </div>

                <button type="submit" id="login-submit-btn" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-[var(--color-bg)] transition-all">
                    <span>Entrar</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <main id="dashboard-content" class="hidden pt-32 pb-20 min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-[var(--color-heading)] mb-2 flex items-center gap-3">
                        <i data-lucide="users" class="w-8 h-8 text-primary"></i>
                        Leads Cadastrados
                    </h1>
                    <p class="text-[var(--color-text-muted)]">Controle e visualize as empresas interessadas nos seus serviços.</p>
                </div>
                <div class="text-sm font-medium px-4 py-2 rounded-lg bg-primary/10 text-primary border border-primary/20 flex items-center gap-2 shadow-sm">
                    <i data-lucide="database" class="w-4 h-4"></i>
                    <span id="total-leads">Carregando...</span>
                </div>
            </div>

            <!-- Leads Table Area -->
            <div class="glass-card rounded-2xl overflow-hidden shadow-xl border border-[var(--color-border)]">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-[var(--color-section-alt)] border-b border-[var(--color-border)]">
                                <th class="p-4 text-sm font-semibold text-[var(--color-heading)] uppercase tracking-wider">Data</th>
                                <th class="p-4 text-sm font-semibold text-[var(--color-heading)] uppercase tracking-wider">Contato</th>
                                <th class="p-4 text-sm font-semibold text-[var(--color-heading)] uppercase tracking-wider">Empresa</th>
                                <th class="p-4 text-sm font-semibold text-[var(--color-heading)] uppercase tracking-wider">Mensagem</th>
                            </tr>
                        </thead>
                        <tbody id="leads-table-body" class="divide-y divide-[var(--color-border)]">
                            <!-- Rows will be populated here by JS -->
                            <tr>
                                <td colspan="4" class="p-8 text-center text-[var(--color-text-muted)]">
                                    <div class="flex flex-col items-center justify-center gap-3">
                                        <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-primary"></i>
                                        <span>Carregando leads do Supabase...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="./config.js"></script>
    <script src="./dashboard.js"></script>
</body>
</html>
